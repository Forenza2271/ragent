server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: root
    password: root
    url: jdbc:mysql://127.0.0.1:3306/ragent?characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 888888

milvus:
  uri: http://localhost:19530

rag:
  default:
    collection-name: rag_default_store
    dimension: 1024
    metric-type: COSINE

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /api/chat
        embedding: /api/embed
    bailian:
      url: https://dashscope.aliyuncs.com
#      api-key: ${BAILIAN_API_KEY:}
      api-key: sk-0ca1e5c7632e4e5f9fdca29457bfbe4e
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    bigmodel:
      url: https://open.bigmodel.cn/api/paas/v4
      api-key: 143c84742f484f9cbeddede350d86ea9.iuGT22PDtkOvgLC0
      endpoints:
        chat: /chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: qwen-flash
    deep-thinking-model: qwen3.5-plus
    candidates:
      - id: qwen-flash
        provider: bailian
        model: qwen-flash
        priority: 0
      - id: qwen3.5-plus
        provider: bailian
        model: qwen3.5-plus
        priority: 3
      - id: qwen3.5:4b-local
        provider: ollama
        model: qwen3.5:4b
        priority: 1
      - id: glm-4.7
        provider: bigmodel
        model: GLM-4.7
        supports-thinking: true
        priority: 2

  embedding:
    default-model: my-bge-m3:latest
    candidates:
      - id: my-bge-m3:latest
        provider: ollama
        model: my-bge-m3:latest
        dimension: 1024
        priority: 1
#      - id: qwen-emb-8b
#        provider: siliconflow
#        model: Qwen/Qwen3-Embedding-8B
#        dimension: 4096
#        priority: 2


  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false
